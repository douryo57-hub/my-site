<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maison de l'Éclat | 愛犬への至高の贈り物</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Times New Roman", "Hiragino Mincho ProN", serif;
            color: #fff;
            background-color: #000;
            overflow-x: hidden;
        }

        /* メインビジュアル */
        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            /* 背景画像の設定 */
            background: url('hero-image.jpg') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 8vh;
            text-align: center;
        }

        /* 文字を読みやすくするための強力なグラデーション */
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 70%; /* グラデーションの範囲を広げて製品と文字を分離 */
            background: linear-gradient(to bottom, 
                rgba(0,0,0,0.9) 0%, 
                rgba(0,0,0,0.6) 40%, 
                rgba(0,0,0,0) 100%);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            padding: 0 20px;
        }

        /* 1行目: ブランド名 */
        .title {
            font-size: 38px;
            letter-spacing: 0.25em;
            color: #d4af37; /* 高級感のあるゴールド */
            margin-bottom: 10px;
            font-weight: normal;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* 2行目: 英文 */
        .english-text {
            font-size: 16px;
            letter-spacing: 0.1em;
            margin-bottom: 30px;
            font-style: italic;
            opacity: 0.9;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* 3行目（追加）: カタカナブランド名 */
        .brand-reading {
            font-size: 14px;
            letter-spacing: 0.3em;
            margin-bottom: 10px;
            color: rgba(255,255,255,0.8);
            font-weight: 300;
        }

        /* 4行目: 日本語キャッチコピー */
        .japanese-text {
            font-size: 18px;
            letter-spacing: 0.15em;
            font-weight: 300;
            line-height: 2.2;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8);
        }

        /* フッター */
        footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: rgba(0,0,0,0.5);
            padding: 30px 20px;
            text-align: center;
            z-index: 2;
        }
        .footer-links a {
            color: #ccc;
            text-decoration: none;
            margin: 0 15px;
            font-size: 12px;
            transition: color 0.3s;
        }
        .footer-links a:hover { color: #d4af37; }

        /* スマホ対応 */
        @media (max-width: 768px) {
            .title { font-size: 28px; }
            .english-text { font-size: 13px; }
            .japanese-text { font-size: 15px; }
            .hero { padding-top: 12vh; }
        }
    </style>
</head>
<body>

    <header class="hero">
        <div class="hero-content">
            <h1 class="title">Maison de l'Éclat</h1>
            
            <p class="english-text">
                The ultimate quality for your beloved dog. <br>
                Infusing eternal love into this single jar.
            </p>

            <p class="brand-reading">メゾンドレクラ</p>

            <p class="japanese-text">
                愛犬のために贈る最高品質の素材。<br>
                この一瓶に、永遠の愛を込めて。
            </p>
        </div>
    </header>

    <footer>
        <div class="footer-links">
            <a href="legal.html">特定商取引法に基づく表記</a>
            <a href="legal.html#privacy">プライバシーポリシー</a>
        </div>
        <p style="font-size: 10px; color: #666; margin-top: 10px;">&copy; 2026 Maison de l'Éclat.</p>
    </footer>

</body>
</html>
