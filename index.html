<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maison de l'Éclat | 愛犬への至高の贈り物</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Times New Roman", "Hiragino Mincho ProN", serif; color: #333; overflow-x: hidden; }

        /* メインビジュアル */
        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            background: url(top-image.jpg) no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 10vh;
            text-align: center;
            color: #fff;
        }

        /* 文字の視認性を上げるグラデーション */
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
            z-index: 1;
        }

        .hero-content { position: relative; z-index: 2; padding: 0 20px; }
        .title { font-size: 32px; letter-spacing: 0.2em; color: #d4af37; margin-bottom: 15px; font-weight: normal; }
        .english-text { font-size: 16px; letter-spacing: 0.1em; margin-bottom: 20px; font-style: italic; }
        .japanese-text { font-size: 18px; letter-spacing: 0.1em; font-weight: 300; line-height: 2; }

        /* フッター（ここにリンクを集約） */
        footer {
            background: #1a1a1a;
            color: #fff;
            padding: 60px 20px;
            text-align: center;
        }
        .footer-links { margin-bottom: 20px; }
        .footer-links a {
            color: #888;
            text-decoration: none;
            margin: 0 15px;
            font-size: 13px;
            transition: color 0.3s;
        }
        .footer-links a:hover { color: #d4af37; }
        .copyright { font-size: 11px; color: #555; }

        @media (max-width: 768px) {
            .title { font-size: 24px; }
            .japanese-text { font-size: 14px; }
        }
    </style>
</head>
<body>
    <header class="hero">
        <div class="hero-content">
            <h1 class="title">Maison de l'Éclat</h1>
            <p class="japanese-text">愛犬のために贈る最高品質の素材。<br>この一瓶に、永遠の愛を込めて。</p>
        </div>
    </header>

    <footer>
        <div class="footer-links">
            <a href="legal.html">特定商取引法に基づく表記</a>
            <a href="legal.html#privacy">プライバシーポリシー</a>
        </div>
        <p class="copyright">&copy; 2026 Maison de l'Éclat. All Rights Reserved.</p>
    </footer>
</body>
</html>
