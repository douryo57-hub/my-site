<style>
:root {
  --noir: #0d0a08;
  --noir-soft: #1a1510;
  --bordeaux: #4a1a1f;
  --bordeaux-deep: #2d0f14;
  --champagne: #c9a961;
  --champagne-light: #e4c989;
  --champagne-dark: #8a6f3d;
  --ivory: #f6f1e8;
  --ivory-warm: #ebe4d4;
  --parchment: #d9cfb8;
  --ink: #2a2520;
  --muted: #6b6259;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  background: var(--ivory);
  color: var(--ink);
  font-family: 'Plus Jakarta Sans', 'Noto Serif JP', sans-serif;
  font-weight: 300;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* Noise overlay for luxury texture */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  opacity: 0.035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* ===== NAV ===== */
.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  padding: 1.5rem 3rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 100;
  background: rgba(13, 10, 8, 0.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(201, 169, 97, 0.15);
}
.nav-brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.35rem;
  letter-spacing: 0.2em;
  color: var(--champagne);
  text-transform: uppercase;
  font-weight: 400;
}
.nav-links { display: flex; gap: 2.5rem; }
.nav-links a {
  color: var(--ivory);
  text-decoration: none;
  font-size: 0.78rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 400;
  transition: color 0.3s;
  position: relative;
}
.nav-links a::after {
  content: '';
  position: absolute;
  bottom: -6px; left: 0;
  width: 0; height: 1px;
  background: var(--champagne);
  transition: width 0.4s;
}
.nav-links a:hover { color: var(--champagne-light); }
.nav-links a:hover::after { width: 100%; }

.lang-switch { display: flex; gap: 0.6rem; font-size: 0.7rem; }
.lang-switch a { text-decoration: none; color: inherit; }
.lang-switch span { color: var(--muted); cursor: pointer; transition: color 0.3s; }
.lang-switch span:hover { color: var(--champagne-light); }
.lang-switch .active { color: var(--champagne); }

@media (max-width: 768px) {
  .nav { padding: 1rem 1.5rem; }
  .nav-links { display: none; }
}

/* ===== HERO ===== */
.hero {
  min-height: 100vh;
  background: radial-gradient(ellipse at 30% 50%, var(--bordeaux-deep) 0%, var(--noir) 60%, var(--noir-soft) 100%);
  color: var(--ivory);
  position: relative;
  display: flex;
  align-items: center;
  overflow: hidden;
  padding: 8rem 3rem 4rem;
}

.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 80% 20%, rgba(201, 169, 97, 0.12) 0%, transparent 50%),
    radial-gradient(circle at 20% 80%, rgba(74, 26, 31, 0.3) 0%, transparent 40%);
}

/* Decorative art-deco border */
.hero-frame {
  position: absolute;
  inset: 2rem;
  border: 1px solid rgba(201, 169, 97, 0.2);
  pointer-events: none;
}
.hero-frame::before, .hero-frame::after {
  content: '';
  position: absolute;
  width: 40px; height: 40px;
  border: 1px solid var(--champagne);
}
.hero-frame::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
.hero-frame::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }

.hero-content {
  position: relative;
  z-index: 2;
  max-width: 1400px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  gap: 5rem;
  align-items: center;
  width: 100%;
}

.hero-text { animation: fadeUp 1.2s ease-out; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.hero-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 1rem;
  font-size: 0.72rem;
  letter-spacing: 0.35em;
  color: var(--champagne);
  text-transform: uppercase;
  margin-bottom: 2rem;
  font-weight: 500;
}
.hero-eyebrow::before {
  content: '';
  width: 40px; height: 1px;
  background: var(--champagne);
}

.hero-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(3rem, 7vw, 6rem);
  font-weight: 300;
  line-height: 1;
  letter-spacing: -0.02em;
  margin-bottom: 1.5rem;
}
.hero-title em {
  font-style: italic;
  color: var(--champagne-light);
  font-weight: 400;
}

.hero-title-jp {
  font-family: 'Noto Serif JP', serif;
  font-size: 1.1rem;
  letter-spacing: 0.3em;
  color: var(--parchment);
  margin-bottom: 2.5rem;
  font-weight: 300;
}

.hero-subtitle {
  font-family: 'Noto Serif JP', serif;
  font-size: 1rem;
  line-height: 2;
  color: var(--ivory-warm);
  max-width: 480px;
  margin-bottom: 3rem;
  font-weight: 300;
}

/* Limited badge with countdown */
.limited-badge {
  display: inline-block;
  padding: 1.25rem 2rem;
  border: 1px solid var(--champagne);
  background: rgba(201, 169, 97, 0.06);
  margin-bottom: 2.5rem;
  position: relative;
}
.limited-badge::before {
  content: '';
  position: absolute;
  top: -1px; left: -1px; right: -1px; bottom: -1px;
  border: 1px solid rgba(201, 169, 97, 0.3);
  transform: translate(6px, 6px);
  pointer-events: none;
}
.limited-label {
  font-size: 0.7rem;
  letter-spacing: 0.3em;
  color: var(--champagne);
  text-transform: uppercase;
  margin-bottom: 0.5rem;
}
.limited-main {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.5rem;
  color: var(--ivory);
  margin-bottom: 0.25rem;
}
.limited-sub {
  font-size: 0.85rem;
  color: var(--parchment);
  font-family: 'Noto Serif JP', serif;
}
.countdown {
  display: flex;
  gap: 1.5rem;
  margin-top: 1rem;
  padding-top: 1rem;
  border-top: 1px solid rgba(201, 169, 97, 0.2);
}
.countdown-unit { text-align: center; }
.countdown-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2rem;
  color: var(--champagne-light);
  font-weight: 400;
  line-height: 1;
}
.countdown-label {
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  color: var(--muted);
  text-transform: uppercase;
  margin-top: 0.25rem;
}

.hero-cta {
  display: inline-flex;
  align-items: center;
  gap: 1rem;
  padding: 1.1rem 2.5rem;
  background: var(--champagne);
  color: var(--noir);
  text-decoration: none;
  letter-spacing: 0.15em;
  font-size: 0.85rem;
  text-transform: uppercase;
  font-weight: 500;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
}
.hero-cta::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--champagne-light);
  transform: translateX(-100%);
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
.hero-cta span { position: relative; z-index: 1; }
.hero-cta:hover::before { transform: translateX(0); }
.hero-cta-arrow {
  position: relative;
  z-index: 1;
  transition: transform 0.4s;
}
.hero-cta:hover .hero-cta-arrow { transform: translateX(6px); }

/* Hero visual */
.hero-visual {
  position: relative;
  aspect-ratio: 3/4;
  animation: fadeUp 1.2s ease-out 0.3s both;
}
.hero-visual-frame {
  position: absolute;
  inset: 0;
  border: 1px solid var(--champagne);
  transform: rotate(-2deg);
}
.hero-visual-inner {
  position: absolute;
  inset: 1.5rem;
  background:
    linear-gradient(135deg, rgba(201, 169, 97, 0.15) 0%, rgba(74, 26, 31, 0.4) 100%),
    url('hero-image.jpg') center/cover;
  transform: rotate(1deg);
  box-shadow: 0 40px 80px rgba(0,0,0,0.5);
}
.hero-visual-label {
  position: absolute;
  bottom: -1rem; left: 50%;
  transform: translateX(-50%) rotate(1deg);
  background: var(--noir);
  padding: 0.75rem 2rem;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  color: var(--champagne);
  font-size: 1rem;
  letter-spacing: 0.1em;
  border: 1px solid var(--champagne);
  white-space: nowrap;
}

@media (max-width: 968px) {
  .hero-content { grid-template-columns: 1fr; gap: 3rem; }
  .hero { padding: 7rem 1.5rem 3rem; }
  .hero-visual { max-width: 400px; margin: 0 auto; }
}

/* ===== SECTION BASE ===== */
.section {
  padding: 8rem 3rem;
  position: relative;
  z-index: 2;
}
.section-inner { max-width: 1200px; margin: 0 auto; }
.section-eyebrow {
  font-size: 0.72rem;
  letter-spacing: 0.35em;
  color: var(--champagne-dark);
  text-transform: uppercase;
  margin-bottom: 1.5rem;
  font-weight: 500;
}
.section-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2.5rem, 5vw, 4rem);
  font-weight: 300;
  line-height: 1.1;
  margin-bottom: 2rem;
  color: var(--ink);
}
.section-title em {
  font-style: italic;
  color: var(--bordeaux);
}

@media (max-width: 768px) {
  .section { padding: 5rem 1.5rem; }
}

/* ===== STORY SECTION ===== */
.story {
  background: var(--ivory);
  position: relative;
}
.story-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 5rem;
  align-items: center;
}
.story-content p {
  font-family: 'Noto Serif JP', serif;
  font-size: 1rem;
  line-height: 2.2;
  color: var(--ink);
  margin-bottom: 1.5rem;
}
.story-signature {
  margin-top: 2rem;
  padding-top: 2rem;
  border-top: 1px solid var(--parchment);
  display: flex;
  align-items: center;
  gap: 1.5rem;
}
.story-signature-name {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 1.3rem;
  color: var(--bordeaux);
}
.story-signature-title {
  font-size: 0.75rem;
  letter-spacing: 0.2em;
  color: var(--muted);
  text-transform: uppercase;
}

.story-visual {
  position: relative;
  aspect-ratio: 4/5;
  background: linear-gradient(135deg, var(--bordeaux-deep), var(--noir));
  overflow: hidden;
}
.story-visual::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 30% 40%, rgba(201, 169, 97, 0.15), transparent 50%),
    radial-gradient(circle at 70% 70%, rgba(201, 169, 97, 0.08), transparent 40%);
}
.story-visual-text {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: var(--champagne);
  text-align: center;
  padding: 2rem;
}
.story-visual-text .big {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(4rem, 10vw, 7rem);
  font-style: italic;
  font-weight: 300;
  line-height: 1;
  margin-bottom: 1rem;
}
.story-visual-text .small {
  font-size: 0.8rem;
  letter-spacing: 0.3em;
  color: var(--parchment);
  text-transform: uppercase;
}

@media (max-width: 768px) {
  .story-grid { grid-template-columns: 1fr; gap: 3rem; }
}

/* ===== INGREDIENTS ===== */
.ingredients {
  background: linear-gradient(180deg, var(--ivory) 0%, var(--ivory-warm) 100%);
  text-align: center;
}
.ingredients-title-block { margin-bottom: 5rem; }
.ingredients-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 3rem;
  margin-top: 4rem;
}
.ingredient-card {
  padding: 3rem 2rem;
  background: var(--ivory);
  border: 1px solid var(--parchment);
  position: relative;
  transition: all 0.5s;
}
.ingredient-card::before {
  content: '';
  position: absolute;
  top: -1px; left: -1px;
  width: 30px; height: 30px;
  border-top: 1px solid var(--champagne);
  border-left: 1px solid var(--champagne);
  transition: all 0.5s;
}
.ingredient-card::after {
  content: '';
  position: absolute;
  bottom: -1px; right: -1px;
  width: 30px; height: 30px;
  border-bottom: 1px solid var(--champagne);
  border-right: 1px solid var(--champagne);
  transition: all 0.5s;
}
.ingredient-card:hover {
  transform: translateY(-8px);
  box-shadow: 0 30px 60px rgba(74, 26, 31, 0.1);
}
.ingredient-card:hover::before, .ingredient-card:hover::after {
  width: 50px; height: 50px;
}
.ingredient-number {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 3rem;
  color: var(--champagne);
  line-height: 1;
  margin-bottom: 1.5rem;
}
.ingredient-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.6rem;
  color: var(--ink);
  margin-bottom: 0.5rem;
  letter-spacing: 0.02em;
}
.ingredient-name-jp {
  font-family: 'Noto Serif JP', serif;
  font-size: 0.85rem;
  color: var(--muted);
  letter-spacing: 0.2em;
  margin-bottom: 1.5rem;
}
.ingredient-desc {
  font-family: 'Noto Serif JP', serif;
  font-size: 0.9rem;
  line-height: 2;
  color: var(--ink);
  margin-bottom: 1.5rem;
}
.ingredient-origin {
  font-size: 0.72rem;
  letter-spacing: 0.25em;
  color: var(--champagne-dark);
  text-transform: uppercase;
  padding-top: 1.5rem;
  border-top: 1px solid var(--parchment);
}

@media (max-width: 768px) {
  .ingredients-grid { grid-template-columns: 1fr; gap: 1.5rem; }
}

/* ===== EVIDENCE ===== */
.evidence {
  background: var(--noir);
  color: var(--ivory);
  text-align: center;
}
.evidence .section-title { color: var(--ivory); }
.evidence .section-title em { color: var(--champagne-light); }
.evidence-stat {
  margin: 4rem auto;
  max-width: 700px;
}
.evidence-number {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(5rem, 15vw, 10rem);
  color: var(--champagne);
  line-height: 1;
  font-weight: 300;
  position: relative;
  display: inline-block;
}
.evidence-number sup {
  font-size: 0.3em;
  vertical-align: top;
  margin-left: 0.2em;
}
.evidence-label {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 1.5rem;
  color: var(--champagne-light);
  margin: 1rem 0 2rem;
}
.evidence-desc {
  font-family: 'Noto Serif JP', serif;
  font-size: 1rem;
  line-height: 2;
  color: var(--ivory-warm);
  max-width: 560px;
  margin: 0 auto 2rem;
}
.evidence-source {
  font-size: 0.75rem;
  letter-spacing: 0.15em;
  color: var(--muted);
  padding-top: 1.5rem;
  border-top: 1px solid rgba(201, 169, 97, 0.2);
  max-width: 500px;
  margin: 2rem auto 0;
  line-height: 1.8;
}

/* ===== SERVING GUIDE ===== */
.serving-guide {
  background: var(--ivory);
}
.serving-container {
  display: flex;
  flex-direction: column;
  gap: 3rem;
}
.serving-card {
  padding: 2.5rem;
  background: var(--ivory-warm);
  border: 1px solid var(--parchment);
  position: relative;
}
.serving-card:hover {
  border-color: var(--champagne-dark);
  box-shadow: 0 10px 40px rgba(74, 26, 31, 0.05);
  transition: all 0.3s;
}
.serving-card-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.5rem;
  color: var(--ink);
  margin-bottom: 2rem;
  border-bottom: 2px solid var(--champagne);
  padding-bottom: 1rem;
}

/* Table */
.serving-table {
  display: flex;
  flex-direction: column;
  gap: 0;
  margin-bottom: 1.5rem;
  border: 1px solid var(--parchment);
}
.table-row {
  display: grid;
  grid-template-columns: 1.2fr 1fr 1.2fr 1.2fr;
  gap: 1rem;
  padding: 1.25rem;
  border-bottom: 1px solid var(--parchment);
  align-items: center;
}
.table-row:last-child {
  border-bottom: none;
}
.table-row.header {
  background: linear-gradient(180deg, var(--ink) 0%, var(--noir-soft) 100%);
  color: white;
}
.table-row.header .table-cell {
  font-weight: 600;
  letter-spacing: 0.05em;
  color: white;
}
.table-cell {
  font-family: 'Noto Serif JP', serif;
  font-size: 0.9rem;
  color: var(--ink);
  line-height: 1.6;
}
.table-cell.highlight {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.2rem;
  color: var(--bordeaux);
  font-weight: 500;
}
.table-sub {
  display: block;
  font-size: 0.75rem;
  color: var(--muted);
  margin-top: 0.3rem;
}
.serving-note {
  font-family: 'Noto Serif JP', serif;
  font-size: 0.85rem;
  color: var(--muted);
  line-height: 1.8;
  padding-top: 1.5rem;
  border-top: 1px solid var(--parchment);
}
.serving-note strong {
  color: var(--bordeaux);
  font-weight: 600;
}

/* Steps */
.serving-steps {
  display: flex;
  flex-direction: column;
  gap: 2rem;
}
.step {
  display: flex;
  gap: 2rem;
}
.step-number {
  flex-shrink: 0;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--champagne), var(--champagne-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 2rem;
  color: var(--noir);
}
.step-content {
  flex: 1;
  padding-top: 0.5rem;
}
.step-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.3rem;
  color: var(--ink);
  margin-bottom: 0.5rem;
  font-weight: 400;
}
.step-content p {
  font-family: 'Noto Serif JP', serif;
  font-size: 0.95rem;
  color: var(--ink);
  line-height: 1.8;
}

/* Grid for two cards side-by-side */
.serving-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 3rem;
}

/* Nutrition */
.nutrition-list {
  display: flex;
  flex-direction: column;
  gap: 1.25rem;
  margin-bottom: 1.5rem;
}
.nutrition-item {
  display: flex;
  justify-content: space-between;
  align-items: center;

<script>
// Countdown to May 1, 2026 12:00 JST
function updateCountdown() {
  const target = new Date('2026-05-01T12:00:00+09:00').getTime();
  const now = new Date().getTime();
  const diff = target - now;

  if (diff < 0) {
    document.getElementById('countdown').innerHTML =
      '<div style="font-family: \'Cormorant Garamond\', serif; font-style: italic; color: var(--champagne-light); font-size: 1.3rem;">— Now Available —</div>';
    return;
  }

  const d = Math.floor(diff / (1000 * 60 * 60 * 24));
  const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const m = Math.floor((diff / 1000 / 60) % 60);
  const s = Math.floor((diff / 1000) % 60);

  document.getElementById('days').textContent = String(d).padStart(2, '0');
  document.getElementById('hours').textContent = String(h).padStart(2, '0');
  document.getElementById('minutes').textContent = String(m).padStart(2, '0');
  document.getElementById('seconds').textContent = String(s).padStart(2, '0');
}
updateCountdown();
setInterval(updateCountdown, 1000);

// Scroll reveal
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('active');
    }
  });
}, { threshold: 0.15 });

document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>
