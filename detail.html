<html lang="ja">

    <title>製品詳細 | Maison de l'Éclat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Times New Roman", "Hiragino Mincho ProN", serif;
            color: #fff;
            background-color: #000;
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
        }

        /* ナビゲーションを画像に重ねて空間を節約 */
        .nav-back {
            position: absolute;
            top: 25px;
            left: 20px;
            z-index: 10;
        }
        .nav-back a {
            color: #fff;
            text-decoration: none;
            font-size: 11px;
            letter-spacing: 0.2em;
            background: rgba(0, 0, 0, 0.4);
            padding: 8px 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            transition: 0.3s;
        }
        .nav-back a:hover {
            border-color: #d4af37;
            color: #d4af37;
        }

        .container { max-width: 800px; margin: 0 auto; padding: 0 0 100px; }

        /* 画像の高さを45vh（画面の4.5割）に抑えて間延びを解消 */
        .product-visual {
            width: 100%;
            height: 45vh;
            background: url('top-image.jpg') no-repeat center center/cover;
            margin-bottom: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            position: relative;
        }

        /* タイトルの配置を上に引き上げる */
        h2 { 
            font-size: clamp(24px, 4vw, 32px);
            color: #d4af37; 
            letter-spacing: 0.3em; 
            margin-bottom: 50px; 
            text-align: center; 
            font-weight: normal; 
            padding: 0 20px;
        }
        
        .section { margin-bottom: 80px; padding: 0 25px; }
        .section-title { 
            color: #d4af37; 
            font-size: 16px; 
            border-bottom: 1px solid #333; 
            padding-bottom: 12px; 
            margin-bottom: 30px; 
            letter-spacing: 0.2em;
            font-weight: normal;
        }

            margin: 50px 0;
            text-align: center;
