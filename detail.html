<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>製品詳細 | Maison de l'Éclat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Times New Roman", "Hiragino Mincho ProN", serif;
            color: #fff;
            background-color: #000;
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
        }

        /* ナビゲーション：画像の上に静止して配置 */
        .nav-back {
            position: absolute;
            top: 30px;
            left: 20px;
            z-index: 100;
        }

        .nav-back a {
            display: inline-flex;
            align-items: center;
            color: #fff;
            text-decoration: none;
            font-size: 10px;
            letter-spacing: 0.2em;
            background: rgba(0, 0, 0, 0.4);
            padding: 12px 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: all 0.4s ease;
            text-transform: uppercase;
        }

        .nav-back a:hover {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(212, 175, 55, 1);
            color: #d4af37;
        }

        .container { max-width: 800px; margin: 0 auto; padding: 0 0 100px; }

        /* メインビジュアル：保存したhero-image.jpgを使用 */
        .product-visual {
            width: 100%;
            height: 55vh;
            background: url('hero-image.jpg') no-repeat center center/cover;
            margin-bottom: 60px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        h2 { 
            font-size: clamp(24px, 4vw, 32px);
            color: #d4af37; 
            letter-spacing: 0.3em; 
            margin-bottom: 80px; 
            text-align: center; 
            font-weight: normal; 
        }
        
        .section { margin-bottom: 120px; padding: 0 25px; }
        .section-title { 
            color: #d4af37; 
            font-size: 14px; 
            border-bottom: 1px solid #333; 
            padding-bottom: 15px; 
            margin-bottom: 50px; 
            letter-spacing: 0.2em;
            text-align: center;
        }

        /* 燕の巣 シズル画像ボックス */
        .syrup-image-box {
            width: 100%;
            margin: 50px 0;
            text-align: center;
        }
        .syrup-image-box img {
            width: 100%;
            height: auto;
            border-radius: 2px;
            box-shadow: 0 0 40px rgba(212,175,55,0.15);
        }
        .img-caption {
            font-size: 11px;
            color: #666;
            margin-top: 15px;
            letter-spacing: 0.1em;
        }

        .content-text { font-size: 15px; font-weight: 300; letter-spacing: 0.05em; color: #ccc; margin-bottom: 25px; }

        /* 3つの魔力セクション */
        .benefit-card {
            margin-bottom: 50px;
            border-left: 1px solid #d4af37;
            padding-left: 25px;
        }
